name: Auto-update formula

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        run: |
          CURRENT=$(grep -oE 'iflow-cli-[0-9]+\.[0-9]+\.[0-9]+' Formula/iflow-cli.rb | head -1 | cut -d'-' -f3)
          LATEST=$(npm view @iflow-ai/iflow-cli version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update formula
        if: steps.check.outputs.updated == 'true'
        env:
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          URL="https://registry.npmjs.org/@iflow-ai/iflow-cli/-/iflow-cli-${LATEST}.tgz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/iflow-cli.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/iflow-cli.rb

      - name: Commit and push
        if: steps.check.outputs.updated == 'true'
        env:
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/iflow-cli.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "bump iflow-cli to ${LATEST}"
          git push
